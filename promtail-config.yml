server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # User Service logs
  - job_name: user-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: cinema-logs
          service: user-service
          __path__: /logs/user-service*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp
            logger: logger_name
            thread: thread_name
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339

  # Cinema Service logs
