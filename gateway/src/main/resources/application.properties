spring.application.name=gateway
server.port=8888

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Gateway Routes Configuration
spring.cloud.gateway.mvc.routes[0].id=user-service
spring.cloud.gateway.mvc.routes[0].uri=lb://user-service
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.mvc.routes[1].id=cinema-service
spring.cloud.gateway.mvc.routes[1].uri=lb://cinema-service
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/cinemas/**,/api/movies/**,/api/showtimes/**

spring.cloud.gateway.mvc.routes[2].id=booking-service
spring.cloud.gateway.mvc.routes[2].uri=lb://booking-service
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/bookings/**,/api/payments/**

spring.cloud.gateway.mvc.routes[3].id=inventory-service
spring.cloud.gateway.mvc.routes[3].uri=lb://inventory-service
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/inventory/**,/api/products/**

spring.cloud.gateway.mvc.routes[4].id=notification-service
spring.cloud.gateway.mvc.routes[4].uri=lb://notification-service
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/api/notifications/**

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG

# JWT Configuration (for token validation)
jwt.secret=mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong12345678
jwt.expiration=86400000
